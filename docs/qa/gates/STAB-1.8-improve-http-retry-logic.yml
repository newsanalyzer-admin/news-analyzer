schema: 1
story: 'STAB-1.8'
story_title: 'Improve HTTP Retry Logic and Error Differentiation'
gate: CONCERNS
status_reason: 'All ACs met with consistent retry semantics across both API clients. Two medium concerns: (1) parseRetryAfter() silently swallows NumberFormatException without logging, (2) CongressApiClient rate limit window reset has a TOCTOU race condition between AtomicLong check and reset.'
reviewer: 'Quinn (Test Architect)'
updated: '2026-03-05T17:00:00Z'

waiver: { active: false }

top_issues:
  - id: 'RETRY-001'
    severity: medium
    finding: 'parseRetryAfter() in both clients catches NumberFormatException with empty catch block. Malformed Retry-After headers are silently ignored with no log output, making rate-limit debugging harder.'
    suggested_action: 'Add log.debug() for malformed Retry-After header values.'
    suggested_owner: dev
  - id: 'RATE-001'
    severity: medium
    finding: 'CongressApiClient.checkRateLimit() has TOCTOU race: windowStart.set() and requestCount.set(0) are not atomic together. Under concurrent load, a request could slip through during the window reset.'
    suggested_action: 'Use synchronized block or AtomicReference with compareAndSet for compound window-reset operation. Low practical risk given current single-threaded usage patterns.'
    suggested_owner: dev
  - id: 'TEST-001'
    severity: low
    finding: 'No test for 429 handling with Retry-After header parsing in either client.'
    suggested_action: 'Add test verifying Retry-After header extraction and fallback to default 10s.'
    suggested_owner: dev

