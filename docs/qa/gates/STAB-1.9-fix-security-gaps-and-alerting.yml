top_issues:
  - id: 'CONC-001'
    severity: medium
    finding: 'AdminSyncController.lastPlumResult, lastUsCodeResult, lastPresidentialResult, lastEoResult are non-volatile instance fields written by one HTTP thread and read by another (health endpoint). Java Memory Model does not guarantee visibility without volatile or synchronization.'
    suggested_action: 'Make result fields volatile or use AtomicReference<> (consistent with RegulationSyncScheduler which correctly uses AtomicReference).'
    suggested_owner: dev
  - id: 'CORS-001'
    severity: low
    finding: 'CORS origins are hardcoded to localhost:3000/3001. This works for dev but will need environment-specific configuration for staging/production.'
    suggested_action: 'Future: externalize CORS origins to application.yml (not in scope for this story).'
    suggested_owner: dev

