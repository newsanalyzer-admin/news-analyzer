# NewsAnalyzer v2 - Development Docker Compose
# For local development with hot reload

version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: newsanalyzer-postgres-dev
    environment:
      POSTGRES_DB: newsanalyzer_dev
      POSTGRES_USER: newsanalyzer
      POSTGRES_PASSWORD: changeme_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newsanalyzer"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: newsanalyzer-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Backend - run manually with Maven for hot reload
  # Use: cd backend && ./mvnw spring-boot:run -Dspring.profiles.active=dev

  # Frontend - run manually with pnpm for hot reload
  # Use: cd frontend && pnpm dev

  # Reasoning Service - run manually with uvicorn for hot reload
  # Use: cd reasoning-service && uvicorn app.main:app --reload

  # ============================================================
  # Observability Stack (OBS-1.1)
  # ============================================================

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.98.0
    container_name: newsanalyzer-otel-collector-dev
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./deploy/observability/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # Collector self-metrics
    # No healthcheck — scratch-based image has no shell tools (wget/curl)
    # Collector is self-healing; exporters reconnect automatically on restart
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: newsanalyzer-prometheus-dev
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-remote-write-receiver"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
    volumes:
      - ./deploy/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_dev_data:/prometheus
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  loki:
    image: grafana/loki:3.0.0
    container_name: newsanalyzer-loki-dev
    command: ["-config.file=/etc/loki/loki-config.yaml", "-config.expand-env=true"]
    volumes:
      - ./deploy/observability/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_dev_data:/loki
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.4.0
    container_name: newsanalyzer-tempo-dev
    command: ["-config.file=/etc/tempo/tempo-config.yaml", "-config.expand-env=true"]
    volumes:
      - ./deploy/observability/tempo-config.yaml:/etc/tempo/tempo-config.yaml:ro
      - tempo_dev_data:/var/tempo
    ports:
      - "3200:3200"   # Tempo HTTP API
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3200/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.0.0
    container_name: newsanalyzer-grafana-dev
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_SERVER_HTTP_PORT=3001
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/home.json
    volumes:
      - ./deploy/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_dev_data:/var/lib/grafana
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_dev_data:
    driver: local
  redis_dev_data:
    driver: local
  prometheus_dev_data:
    driver: local
  loki_dev_data:
    driver: local
  tempo_dev_data:
    driver: local
  grafana_dev_data:
    driver: local

networks:
  default:
    name: newsanalyzer-dev-network
