# Tempo Configuration — Distributed Trace Storage
# Runs in single-binary mode for dev
# Image: grafana/tempo:2.4.0

server:
  http_listen_port: 3200

# OTLP receiver — accepts traces pushed from OTel Collector
distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

# Local filesystem storage for dev (production would use S3/GCS)
storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal
    block:
      bloom_filter_false_positive: 0.05

# Compactor merges small trace blocks into larger ones
compactor:
  compaction:
    block_retention: ${TEMPO_BLOCK_RETENTION:-168h}    # Default 7 days (dev). Production overrides via env var. Requires -config.expand-env=true.

# Metrics generator — creates span metrics (RED metrics from traces)
metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]
