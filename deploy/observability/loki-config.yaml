# Loki Configuration — Log Aggregation
# Runs in single-binary mode (all components in one process) for dev
# Image: grafana/loki:3.0.0

auth_enabled: false

server:
  http_listen_port: 3100

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: "2024-01-01"
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  # Max log line size — reject anything over 256KB
  max_line_size: 256000
  # Ingestion rate limit per tenant (bytes/sec)
  ingestion_rate_mb: 10
  ingestion_burst_size_mb: 20
  # Retention — default 7 days (dev). Production overrides via LOKI_RETENTION_PERIOD env var.
  # Requires -config.expand-env=true on Loki command line.
  retention_period: ${LOKI_RETENTION_PERIOD:-168h}

compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  delete_request_store: filesystem
